name: limma_voom_run
description: Run limma-voom differential expression analysis from counts and metadata.
when_to_use: Use for differential expression with limma-voom, good for complex designs
when_not_to_use: Use DESeq2 for simpler two-group comparisons with small sample sizes
risk_level: medium
tools_required:
- rscript
- limma
capabilities:
- differential_analysis
- group_comparison
input_types:
- tsv
- csv
output_types:
- tsv
- csv
analysis_categories:
- rna_seq_differential_expression
- multi_model_dge_pathway
parameters:
  script_path:
    type: path
    description: Path to limma-voom wrapper script.
    required: false
    ownership: harness_managed
  counts_matrix:
    type: path
    description: Count matrix input.
    required: true
    file_role: counts_matrix
    ownership: user_input
  metadata_table:
    type: path
    description: Sample annotation table.
    required: true
    file_role: sample_metadata
    ownership: user_input
  design_formula:
    type: string
    description: limma design formula.
    required: true
    ownership: tuning
  contrast:
    type: string
    description: Target contrast.
    required: true
    ownership: tuning
  output_dir:
    type: path
    description: Output directory.
    required: true
    file_role: output_dir
    ownership: execution_output
system_requirements:
  min_ram_gb: 8
  min_cores: 2
command_template: Rscript {script_path} --counts {counts_matrix} --metadata {metadata_table} --design
  {design_formula} --contrast {contrast} --outdir {output_dir}
