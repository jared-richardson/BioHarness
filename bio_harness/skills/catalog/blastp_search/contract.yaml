name: blastp_search
description: Run BLASTP protein homology search and emit tabular hits.
when_to_use: Use for protein sequence similarity searches against a protein database
when_not_to_use: Not for nucleotide searches (use blastn) or translated searches (use blastx/tblastn)
risk_level: medium
tools_required:
- blastp
capabilities:
- protein_analysis
- annotation
input_types:
- fasta_protein
output_types:
- tsv
- xml
analysis_categories:
- comparative_genomics
- annotation
parameters:
  query_fasta:
    type: path
    description: Protein FASTA query file.
    required: true
  database:
    type: string
    description: BLAST protein database name/path.
    required: true
  output_tsv:
    type: path
    description: Output tabular hit file.
    required: true
  outfmt:
    type: string
    description: BLAST outfmt string.
    required: false
  evalue:
    type: string
    description: E-value threshold.
    required: false
  threads:
    type: integer
    description: Thread count.
    required: false
system_requirements:
  min_ram_gb: 4
  min_cores: 2
command_template: blastp -query {query_fasta} -db {database} -out {output_tsv} -outfmt {outfmt} -num_threads
  {threads} -evalue {evalue}
source_definition: bio_harness/skills/definitions/blastp_search.md
generated_by: scripts/generate_standard_skill_packages.py
