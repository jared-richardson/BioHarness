name: subread_align
description: Align paired-end reads with the Subread suite using Subjunc/Subread and produce a sorted
  indexed BAM.
when_to_use: Use for fast short-read alignment as an alternative to BWA/bowtie2
when_not_to_use: Not for spliced alignment (use STAR) or long reads (use minimap2)
risk_level: medium
tools_required:
- subread
- samtools
capabilities:
- alignment
- reference_inputs
input_types:
- fastq
- fasta_reference
output_types:
- bam
analysis_categories:
- variant_calling
- rna_seq_differential_expression
parameters:
  index_base:
    type: path
    description: Alignment index basename to use at runtime.
    required: true
    file_role: buildable_index
  reference_fasta:
    type: path
    description: Reference FASTA used to build the Subread index if needed.
    required: true
    file_role: reference_genome
  reads_1:
    type: path
    description: Read 1 FASTQ path.
    required: true
    file_role: input_fastq_r1
  reads_2:
    type: path
    description: Read 2 FASTQ path.
    required: true
    file_role: input_fastq_r2
  output_bam:
    type: path
    description: Coordinate-sorted BAM output path.
    required: true
    file_role: output_dir
  threads:
    type: integer
    description: Alignment and sorting threads.
    required: false
  cache_index_base:
    type: path
    description: Optional reusable Subread index basename.
    required: false
system_requirements:
  min_ram_gb: 8
  min_cores: 2
command_template: subread-buildindex -o {index_base} {reference_fasta} && subjunc -T {threads} -i {index_base}
  -r {reads_1} -R {reads_2} -o {output_bam}
source_definition: bio_harness/skills/definitions/subread_align.md
generated_by: scripts/generate_standard_skill_packages.py
