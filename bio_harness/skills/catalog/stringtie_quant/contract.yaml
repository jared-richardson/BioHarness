name: stringtie_quant
description: Quantify expression from aligned RNA-seq BAMs with StringTie.
when_to_use: Use for alignment-based transcript expression estimation and guided transcript reconstruction
  from RNA-seq BAM files
when_not_to_use: Not for raw FASTQ pseudoalignment quantification when Salmon or kallisto is sufficient
risk_level: medium
tools_required:
- stringtie
- samtools
capabilities:
- quantification
input_types:
- bam
- gtf
output_types:
- gtf
- tsv
canonical_output_filenames:
  output_gtf: assembled.gtf
  gene_abundance_tsv: gene_abundances.tsv
analysis_categories:
- transcript_quantification
- rna_seq_differential_expression
parameters:
  input_bam:
    type: path
    description: Coordinate-sorted RNA-seq BAM file.
    required: true
    file_role: input_bam
  annotation_gtf:
    type: path
    description: Reference transcript annotation GTF.
    required: true
    file_role: reference_annotation
  output_gtf:
    type: path
    description: Output GTF with assembled or quantified transcripts.
    required: true
    file_role: output_dir
  gene_abundance_tsv:
    type: path
    description: Optional gene abundance output TSV.
    required: false
    file_role: output_dir
  ballgown_dir:
    type: path
    description: Optional Ballgown output directory.
    required: false
    file_role: output_dir
  threads:
    type: integer
    description: Thread count.
    required: false
  estimate_reference_only:
    type: boolean
    description: Restrict estimates to reference transcripts with `-e`.
    required: false
system_requirements:
  min_ram_gb: 8
  min_cores: 4
command_template: stringtie {input_bam} -G {annotation_gtf} -o {output_gtf} -A {gene_abundance_tsv} -p
  {threads}
source_definition: bio_harness/skills/definitions/stringtie_quant.md
generated_by: scripts/generate_standard_skill_packages.py
