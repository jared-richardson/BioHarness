name: rpsblast_search
description: Run RPS-BLAST protein-to-domain search and emit tabular hits.
when_to_use: Use to search protein queries against a conserved-domain or profile BLAST database
when_not_to_use: Not for ordinary protein databases built with makeblastdb
risk_level: medium
tools_required:
- rpsblast
capabilities:
- annotation
- protein_analysis
input_types:
- fasta_protein
output_types:
- tsv
- xml
analysis_categories:
- comparative_genomics
- annotation
parameters:
  query_fasta:
    type: path
    description: Protein FASTA query file.
    required: true
  database:
    type: string
    description: Conserved-domain/profile BLAST database path.
    required: true
  output_tsv:
    type: path
    description: Output hit file.
    required: true
  comp_based_stats:
    type: string
    description: Optional composition-based statistics mode.
    required: false
  outfmt:
    type: string
    description: BLAST outfmt string.
    required: false
  evalue:
    type: string
    description: E-value threshold.
    required: false
  threads:
    type: integer
    description: Thread count.
    required: false
system_requirements:
  min_ram_gb: 4
  min_cores: 2
command_template: rpsblast -query {query_fasta} -db {database} -out {output_tsv} -outfmt {outfmt} -num_threads
  {threads} -evalue {evalue}
source_definition: bio_harness/skills/definitions/rpsblast_search.md
generated_by: scripts/generate_standard_skill_packages.py
